<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRABR — Video Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff00;
      --accent-dim: rgba(232, 255, 0, 0.08);
      --text: #f0f0f0;
      --muted: #555;
      --error: #ff4545;
      --success: #00e87a;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    header { text-align: center; margin-bottom: 3.5rem; }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 14vw, 9rem);
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 60px rgba(232,255,0,0.25);
    }
    .tagline {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
    }
    .input-row { display: flex; border: 1px solid var(--border); transition: border-color 0.2s; }
    .input-row:focus-within { border-color: var(--accent); }
    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 0.9rem 1rem;
      min-width: 0;
    }
    #grab-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      padding: 0 1.6rem;
      cursor: pointer;
    }
    #grab-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
    #status { margin-top: 1.5rem; font-size: 0.78rem; min-height: 1.2em; }
    .status-loading { color: var(--accent); }
    .status-error   { color: var(--error); }
    .status-success { color: var(--success); }
    #result { margin-top: 1.5rem; display: none; }
    .result-inner {
      border: 1px solid var(--border);
      background: var(--accent-dim);
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .dl-btn {
      background: var(--accent);
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      padding: 0.55rem 1.2rem;
      text-decoration: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 0.7em;
      height: 0.7em;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 0.4em;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="logo">GRABR</div>
      <div class="tagline">Minimalist Media Extraction</div>
    </header>

    <div class="card">
      <div class="input-row">
        <input id="url-input" type="url" placeholder="Paste link here..." autocomplete="off" />
        <button id="grab-btn" onclick="grab()">GRAB</button>
      </div>
      <div id="status" class="status-idle">// ready</div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    async function grab() {
      const urlInput = document.getElementById('url-input');
      const url = urlInput.value.trim();
      const btn = document.getElementById('grab-btn');
      const resultDiv = document.getElementById('result');
      
      if (!url) return setStatus('// paste a link', 'error');

      btn.disabled = true;
      resultDiv.style.display = 'none';
      setStatus('<span class="spinner"></span> Bypassing restrictions...', 'loading');

      try {
        const res = await fetch('https://cobalt-latest-cxzf.onrender.com/', {
          method: 'POST',
          headers: { 
            'Accept': 'application/json',
            'Content-Type': 'application/json' 
          },
          body: JSON.stringify({ 
            url: url,
            downloadMode: 'tunnel' // Vital for Twitter/X and bypassing 403 blocks
          })
        });

        // Ensure the response is valid JSON
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
           throw new Error("Server warming up. Try again in 10s.");
        }

        const data = await res.json();

        if (data.status === 'error') {
          setStatus('// ' + (data.text || 'engine error'), 'error');
        } else if (data.url) {
          setStatus('// success', 'success');
          showResult(data.url, data.filename || 'download');
        } else if (data.status === 'picker') {
          setStatus('// multiple items found', 'success');
          showPicker(data.picker);
        }
      } catch (err) {
        console.error("Grab Error:", err);
        setStatus('// ' + (err.message || 'connection failed'), 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(m, t) {
      const s = document.getElementById('status');
      s.className = 'status-' + t;
      s.innerHTML = m;
    }

    function showResult(url, name) {
      const r = document.getElementById('result');
      r.innerHTML = `
        <div class="result-inner">
          <div style="flex:1; font-size:0.75rem;">${name}</div>
          <a class="dl-btn" href="${url}" target="_blank">Download</a>
        </div>`;
      r.style.display = 'block';
    }

    function showPicker(items) {
      const r = document.getElementById('result');
      let h = '<div style="display:grid; gap:0.5rem; margin-top:1rem;">';
      items.forEach((item, i) => {
        h += `<a href="${item.url}" class="dl-btn" style="text-align:center;" target="_blank">Part ${i+1}</a>`;
      });
      h += '</div>';
      r.innerHTML = h;
      r.style.display = 'block';
    }
  </script>
</body>
</html>
